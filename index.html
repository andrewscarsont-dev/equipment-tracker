<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#f5f4f0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>BTC Equipment Report</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap');

  :root {
    --black: #f5f4f0;
    --charcoal: #ffffff;
    --steel: #eeede9;
    --mid: #a8a7a2;
    --muted: #908f89;
    --border: #d6d4ce;
    --accent: #c8261b;
    --accent-dim: #9a1810;
    --white: #1c1c1a;
    --off: #3c3c38;
    --red: #c0392b;
    --green: #1a7a40;
    --safe-bottom: env(safe-area-inset-bottom, 0px);
    --safe-top: env(safe-area-inset-top, 0px);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  html { -webkit-text-size-adjust: 100%; }

  body {
    background: var(--black);
    color: var(--white);
    font-family: 'IBM Plex Sans', sans-serif;
    font-size: 13px;
    min-height: 100vh;
    overscroll-behavior-y: contain;
  }

  /* ── HEADER ── */
  .app-header {
    background: var(--charcoal);
    border-bottom: 2px solid var(--accent);
    padding: calc(14px + var(--safe-top)) 24px 14px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .app-header h1 {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--accent);
  }

  .app-header .meta {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.05em;
  }

  /* ── MAIN LAYOUT ── */
  .container {
    max-width: 1200px;
    margin: 0 auto;
    padding: 24px 24px 80px;
  }

  /* ── REPORT META ── */
  .report-meta {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 1px;
    background: var(--border);
    border: 1px solid var(--border);
    margin-bottom: 24px;
  }

  .meta-field {
    background: var(--charcoal);
    padding: 12px 14px;
  }

  .meta-field label {
    display: block;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 6px;
  }

  .meta-field input, .meta-field select {
    background: transparent;
    border: none;
    color: var(--white);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 13px;
    font-weight: 500;
    width: 100%;
    outline: none;
  }

  .meta-field input::placeholder { color: var(--mid); }
  .meta-field select option { background: var(--charcoal); }

  /* ── WEEK STRIP ── */
  .week-strip {
    display: flex;
    gap: 1px;
    background: var(--border);
    border: 1px solid var(--border);
    margin-bottom: 24px;
    align-items: stretch;
  }

  .week-label {
    background: var(--steel);
    padding: 10px 14px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
    display: flex;
    align-items: center;
    white-space: nowrap;
  }

  .week-days {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    flex: 1;
    gap: 1px;
    background: var(--border);
  }

  .week-day {
    background: var(--charcoal);
    padding: 8px 10px;
    text-align: center;
  }

  .week-day .day-name {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.1em;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 4px;
  }

  .week-day input {
    background: transparent;
    border: none;
    color: var(--accent);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    font-weight: 600;
    width: 100%;
    text-align: center;
    outline: none;
  }

  .week-day input::placeholder { color: var(--mid); }

  /* ── JOB BAR ── */
  .job-bar {
    display: flex;
    align-items: stretch;
    gap: 1px;
    background: var(--border);
    border: 1px solid var(--border);
    margin-bottom: 24px;
  }

  .job-bar-label {
    background: var(--steel);
    padding: 10px 14px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
    display: flex;
    align-items: center;
    white-space: nowrap;
  }

  .job-select {
    flex: 1;
    background: var(--charcoal);
    border: none;
    color: var(--accent);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 13px;
    font-weight: 600;
    padding: 10px 14px;
    outline: none;
    cursor: pointer;
    min-width: 0;
  }

  .job-select option { background: var(--charcoal); color: var(--white); }

  .job-bar .btn-add { border: none; }

  /* ── SECTION HEADER ── */
  .section-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 8px;
  }

  .section-title {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--muted);
  }

  .btn-add {
    background: var(--accent);
    color: #0a0a0a;
    border: none;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 7px 14px;
    cursor: pointer;
    transition: background 0.15s;
  }

  .btn-add:hover, .btn-add:active { background: #d93525; }

  /* ── EQUIPMENT TABLE (desktop) ── */
  .equip-table {
    width: 100%;
    border-collapse: collapse;
    border: 1px solid var(--border);
  }

  .equip-table thead tr { background: var(--steel); }

  .equip-table th {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 8px;
    font-weight: 600;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
    padding: 8px 10px;
    text-align: left;
    border-right: 1px solid var(--border);
    white-space: nowrap;
  }

  .equip-table th:last-child { border-right: none; }

  .equip-table tbody tr {
    border-bottom: 1px solid var(--border);
    transition: background 0.1s;
  }

  .equip-table tbody tr:hover { background: rgba(200,38,27,0.06); }

  .equip-table td {
    padding: 0;
    border-right: 1px solid var(--border);
    vertical-align: middle;
  }

  .equip-table td:last-child { border-right: none; }

  .equip-table td input,
  .equip-table td select {
    background: transparent;
    border: none;
    color: var(--white);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    padding: 10px 10px;
    width: 100%;
    outline: none;
    min-width: 0;
  }

  .equip-table td input::placeholder { color: var(--mid); }
  .equip-table td select option { background: var(--charcoal); }

  .day-cell {
    text-align: center;
    width: 36px;
  }

  .day-cell input[type="checkbox"] {
    width: 16px;
    height: 16px;
    accent-color: var(--accent);
    cursor: pointer;
    padding: 0;
    margin: 0 auto;
    display: block;
  }

  .equip-table td select {
    font-size: 11px;
    color: var(--off);
  }

  .cost-cell {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    color: var(--accent);
    font-weight: 600;
    padding: 10px 10px;
    white-space: nowrap;
    text-align: right;
  }

  .cost-cell input {
    color: var(--accent) !important;
    font-weight: 600;
    text-align: right;
  }

  /* hour-meter cells in desktop table */
  .hrs-cell {
    padding: 0;
  }

  .hrs-cell input {
    color: var(--off) !important;
    text-align: right;
    font-weight: 500;
  }

  .hrs-used-cell {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    color: var(--green);
    font-weight: 600;
    padding: 10px 10px;
    text-align: right;
    white-space: nowrap;
  }

  .hrs-used-cell .hrs-empty { color: var(--mid); font-weight: 400; }
  .hrs-used-cell .hrs-warn { color: var(--red); }

  /* mobile card hours-used readout */
  .hrs-used-readout .hrs-used-value {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 16px;
    font-weight: 600;
    color: var(--green);
    padding: 2px 0;
  }

  .hrs-used-readout .hrs-empty { color: var(--mid); font-weight: 400; }
  .hrs-used-readout .hrs-warn { color: var(--red); }

  .btn-del {
    background: none;
    border: none;
    color: var(--mid);
    font-size: 16px;
    cursor: pointer;
    padding: 8px 12px;
    line-height: 1;
    transition: color 0.15s;
    display: block;
    margin: auto;
  }

  .btn-del:hover, .btn-del:active { color: var(--red); }

  /* "All week" on-site toggle (desktop column + mobile chip header) */
  .btn-all-days {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    padding: 4px 7px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    cursor: pointer;
    white-space: nowrap;
    transition: all 0.12s;
  }
  .btn-all-days:hover { border-color: var(--accent); color: var(--accent); }
  .btn-all-days.active {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
  }

  .days-chips-head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
    margin-bottom: 6px;
  }
  .days-chips-head label { margin-bottom: 0 !important; }

  /* Collapsed "on-site all week" cell (desktop) + banner (mobile) */
  .day-cell.days-collapsed { text-align: center; }
  .btn-collapsed-days {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    width: 100%;
    padding: 6px 8px;
    border: 1px solid var(--accent);
    background: rgba(200, 38, 27, 0.08);
    color: var(--accent);
    cursor: pointer;
    transition: all 0.12s;
  }
  .btn-collapsed-days:hover { background: var(--accent); color: #fff; }
  .days-collapsed-banner {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.04em;
    color: var(--accent);
    border: 1px solid var(--accent);
    background: rgba(200, 38, 27, 0.08);
    padding: 10px;
    text-align: center;
  }

  /* ── MOBILE CARDS (hidden on desktop) ── */
  .equip-cards { display: none; }

  .equip-card {
    background: var(--charcoal);
    border: 1px solid var(--border);
    margin-bottom: 10px;
    overflow: hidden;
  }

  .card-head {
    display: flex;
    align-items: stretch;
    justify-content: space-between;
    background: var(--steel);
    border-bottom: 1px solid var(--border);
  }

  .card-head-main {
    flex: 1;
    padding: 10px 12px;
    min-width: 0;
  }

  .card-head .card-desc {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 14px;
    font-weight: 600;
    color: var(--white);
    background: transparent;
    border: none;
    width: 100%;
    outline: none;
    padding: 0;
  }

  .card-head .card-sub {
    display: flex;
    gap: 8px;
    margin-top: 4px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 0.05em;
  }

  .card-head .card-sub span { white-space: nowrap; }

  .card-del {
    background: transparent;
    border: none;
    border-left: 1px solid var(--border);
    color: var(--mid);
    font-size: 22px;
    line-height: 1;
    padding: 0 18px;
    cursor: pointer;
  }
  .card-del:active { color: var(--red); }

  .card-body {
    padding: 12px;
  }

  .field-grid {
    display: grid;
    grid-template-columns: 1fr;
    gap: 1px;
    background: var(--border);
    border: 1px solid var(--border);
    margin-bottom: 10px;
  }

  .field-grid .field-cell {
    background: var(--charcoal);
    padding: 10px 12px;
  }

  .field-grid .field-cell.full { grid-column: 1 / -1; }

  .field-grid label {
    display: block;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 8px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 4px;
  }

  .field-grid input, .field-grid select {
    background: transparent;
    border: none;
    color: var(--white);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 14px;
    font-weight: 500;
    width: 100%;
    outline: none;
    padding: 0;
  }

  .field-grid input.cost-input {
    color: var(--accent);
    font-weight: 600;
  }

  .field-grid select option { background: var(--charcoal); }

  /* on-site days as touch chips */
  .days-chips {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 4px;
  }

  .day-chip {
    background: var(--steel);
    border: 1px solid var(--border);
    color: var(--muted);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    padding: 10px 0;
    text-align: center;
    cursor: pointer;
    user-select: none;
    transition: all 0.12s;
  }

  .day-chip.active {
    background: var(--accent);
    border-color: var(--accent);
    color: var(--black);
  }

  .days-chips-wrap label {
    display: block;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 8px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 6px;
  }

  /* ── TOTALS BAR ── */
  .totals-bar {
    display: flex;
    justify-content: flex-end;
    align-items: center;
    gap: 32px;
    padding: 14px 16px;
    background: var(--charcoal);
    border: 1px solid var(--border);
    border-top: none;
    margin-bottom: 28px;
  }

  .total-item { text-align: right; }

  .total-item .t-label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 2px;
  }

  .total-item .t-value {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 18px;
    font-weight: 700;
    color: var(--accent);
  }

  /* ── ACTIONS ── */
  .actions {
    display: flex;
    gap: 10px;
    justify-content: flex-end;
  }

  .btn-action {
    border: 1px solid var(--border);
    background: transparent;
    color: var(--off);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 10px 20px;
    cursor: pointer;
    transition: all 0.15s;
  }

  .btn-action:hover, .btn-action:active {
    border-color: var(--accent);
    color: var(--accent);
  }

  .btn-action.primary {
    background: var(--accent);
    border-color: var(--accent);
    color: #0a0a0a;
  }

  .btn-action.primary:hover, .btn-action.primary:active { background: #d93525; }

  /* ── MOBILE STICKY ACTION BAR ── */
  .mobile-action-bar { display: none; }

  /* ────────────────────────────────────────────
     MOBILE BREAKPOINT
  ──────────────────────────────────────────── */
  @media (max-width: 768px) {

    body { font-size: 14px; }

    .app-header {
      padding: calc(12px + var(--safe-top)) 14px 12px;
    }
    .app-header h1 { font-size: 12px; letter-spacing: 0.12em; }
    .app-header .meta { font-size: 10px; }

    .container {
      padding: 14px 12px calc(96px + var(--safe-bottom));
    }

    /* meta: 2 cols, larger inputs */
    .report-meta {
      grid-template-columns: 1fr 1fr;
      margin-bottom: 14px;
    }
    .meta-field { padding: 10px 12px; }
    .meta-field label { font-size: 8px; margin-bottom: 4px; }
    .meta-field input, .meta-field select { font-size: 16px; }

    /* week strip: stack label above grid */
    .week-strip {
      flex-direction: column;
      margin-bottom: 14px;
    }
    .week-label {
      justify-content: center;
      padding: 8px 10px;
      border-bottom: 1px solid var(--border);
    }
    .week-days {
      width: 100%;
    }
    .week-day { padding: 6px 4px; }
    .week-day .day-name { font-size: 9px; margin-bottom: 2px; }
    .week-day input { font-size: 11px; }

    /* hide desktop table on mobile */
    .equip-table { display: none; }

    /* show mobile cards */
    .equip-cards { display: block; }

    /* section header */
    .section-header { margin-bottom: 10px; }
    .section-title { font-size: 10px; }
    .btn-add {
      font-size: 11px;
      padding: 10px 16px;
    }

    /* totals: stack vertically with proper spacing */
    .totals-bar {
      flex-direction: row;
      gap: 16px;
      justify-content: space-between;
      padding: 14px 14px;
      margin-bottom: 16px;
    }
    .total-item { flex: 1; text-align: left; }
    .total-item:last-child { text-align: right; }
    .total-item .t-value { font-size: 20px; }

    /* hide inline action row — use sticky bar */
    .desktop-actions { display: none; }

    /* sticky mobile action bar */
    .mobile-action-bar {
      display: flex;
      gap: 8px;
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: var(--charcoal);
      border-top: 2px solid var(--accent);
      padding: 10px 12px calc(10px + var(--safe-bottom));
      z-index: 90;
    }
    .mobile-action-bar .btn-action {
      flex: 1;
      padding: 12px 8px;
      font-size: 10px;
      letter-spacing: 0.08em;
    }
    .mobile-action-bar .btn-action.primary { flex: 1.4; }

    /* prevent iOS auto-zoom on input focus */
    input[type="text"],
    input[type="number"],
    input[type="date"],
    input[type="tel"],
    select,
    textarea {
      font-size: 16px !important;
    }
    /* but keep visual hierarchy on small labels */
    .week-day input { font-size: 14px !important; }
    .card-head .card-desc { font-size: 16px !important; }

  }

  /* very small phones */
  @media (max-width: 380px) {
    .container { padding: 12px 10px calc(96px + var(--safe-bottom)); }
    .report-meta { grid-template-columns: 1fr; }
    .day-chip { font-size: 9px; padding: 9px 0; }
  }

  /* ── PRINT ── */
  @media print {
    @page { size: landscape; margin: 0.4in; }

    body { background: white; color: black; font-size: 8px; }
    .app-header { background: white; border-bottom: 2px solid black; color: black; position: static; padding: 6px 12px; }
    .app-header h1, .app-header .meta { color: black; }
    .container { padding: 8px; max-width: 100%; }

    /* hide non-print elements */
    .actions, .btn-add, .btn-del, .section-header, .mobile-action-bar,
    .equip-cards, .sync-pill, #live-clock, .job-bar { display: none !important; }

    /* meta / week strip */
    .report-meta, .week-strip, .equip-table, .totals-bar { background: white; color: black; }
    .report-meta { border-color: #ccc; }
    .meta-field { background: #f5f5f5; border: 1px solid #ccc; }
    .meta-field label, .week-label, .section-title, .equip-table th, .total-item .t-label { color: #555; }
    .meta-field input, .meta-field select, .week-day input { color: black; }
    .week-day { background: #f5f5f5; }
    .week-day .day-name { color: #555; }
    .equip-table thead tr { background: #eee; }
    .cost-cell, .cost-cell input, .total-item .t-value { color: #8a5e00; }
    .totals-bar { background: #f5f5f5; }
    .equip-table tbody tr:hover { background: transparent; }

    /* table fits full page width */
    .equip-table {
      display: table !important;
      width: 100% !important;
      table-layout: fixed !important;
      border-collapse: collapse;
      font-size: 8px;
    }
    .equip-table th, .equip-table td {
      width: auto !important;
      padding: 2px 3px !important;
      overflow: hidden;
      white-space: nowrap;
      border: 1px solid #ddd;
    }

    /* hide delete column + the interactive "All week" column */
    .equip-table th:last-child,
    .equip-table td:last-child,
    .equip-table tr > :nth-child(13) { display: none !important; }

    /* column widths as percentages */
    .equip-table tr > :nth-child(1)  { width: 20% !important; } /* Description */
    .equip-table tr > :nth-child(2)  { width: 10% !important; } /* Equip # */
    .equip-table tr > :nth-child(3)  { width: 8%  !important; } /* Company */
    .equip-table tr > :nth-child(4)  { width: 8%  !important; } /* Rental Start */
    .equip-table tr > :nth-child(5)  { width: 8%  !important; } /* Est. Release */
    .equip-table tr > :nth-child(6),
    .equip-table tr > :nth-child(7),
    .equip-table tr > :nth-child(8),
    .equip-table tr > :nth-child(9),
    .equip-table tr > :nth-child(10),
    .equip-table tr > :nth-child(11),
    .equip-table tr > :nth-child(12) { width: 3%  !important; text-align: center !important; } /* Sa-Fri */
    /* nth-child(13) = "All week" column, hidden above */
    .equip-table tr > :nth-child(14) { width: 8%  !important; } /* Start Hrs */
    .equip-table tr > :nth-child(15) { width: 8%  !important; } /* End Hrs */
    .equip-table tr > :nth-child(16) { width: 9%  !important; } /* Hrs Used */

    /* inputs render as plain text */
    .equip-table td input[type="text"],
    .equip-table td input[type="date"] {
      border: none !important;
      background: transparent !important;
      width: 100% !important;
      font-size: 8px !important;
      color: black !important;
      padding: 0 !important;
    }

    * { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
  }

  .sync-pill { font-family:'IBM Plex Mono',monospace; font-size:9px; font-weight:700; letter-spacing:0.1em; text-transform:uppercase; padding:3px 9px; border:1px solid; }
  .sync-pill.loading { color:var(--muted); border-color:var(--border); }
  .sync-pill.saving  { color:var(--accent); border-color:var(--accent-dim); }
  .sync-pill.saved   { color:var(--green);  border-color:rgba(39,174,96,0.35); }
  .sync-pill.error   { color:var(--red);    border-color:rgba(192,57,43,0.35); }
</style>
</head>
<body>

<div class="app-header">
  <h1>⬛ Equipment Report</h1>
  <div style="display:flex;align-items:center;gap:14px">
    <span id="sync-pill" class="sync-pill loading">Loading</span>
    <span class="meta" id="live-clock"></span>
  </div>
</div>

<div class="container">

  <!-- Job Switcher -->
  <div class="job-bar">
    <div class="job-bar-label">Job</div>
    <select id="job-select" class="job-select"></select>
    <button class="btn-add" onclick="promptNewJob()">+ New Job</button>
  </div>

  <!-- Report Meta -->
  <div class="report-meta">
    <div class="meta-field">
      <label>Project / Job</label>
      <input type="text" id="project" placeholder="Enter job name" autocomplete="off" />
    </div>
    <div class="meta-field">
      <label>Report #</label>
      <input type="text" id="report-num" placeholder="Enter report #" autocomplete="off" />
    </div>
    <div class="meta-field">
      <label>Superintendent</label>
      <input type="text" id="super" placeholder="Enter name" autocomplete="off" />
    </div>
    <div class="meta-field">
      <label>Week Ending</label>
      <select id="week-select"></select>
    </div>
  </div>

  <!-- Week Day Dates -->
  <div class="week-strip">
    <div class="week-label">Week Dates</div>
    <div class="week-days" id="week-days-grid"></div>
  </div>

  <!-- Equipment Section -->
  <div class="section-header">
    <span class="section-title">On-Site Equipment</span>
    <button class="btn-add" onclick="addRow()">+ Add Equipment</button>
  </div>

  <!-- Desktop Table -->
  <table class="equip-table">
    <thead>
      <tr>
        <th style="width:160px">Description</th>
        <th style="width:90px">Equip #</th>
        <th style="width:90px">Company</th>
        <th style="width:70px">Rental Start</th>
        <th style="width:70px">Est. Release</th>
        <th class="day-cell" title="Saturday">Sa</th>
        <th class="day-cell" title="Sunday">Su</th>
        <th class="day-cell" title="Monday">M</th>
        <th class="day-cell" title="Tuesday">T</th>
        <th class="day-cell" title="Wednesday">W</th>
        <th class="day-cell" title="Thursday">T</th>
        <th class="day-cell" title="Friday">F</th>
        <th class="day-cell" title="On-site all week">All</th>
        <th style="width:75px;text-align:right">Start Hrs</th>
        <th style="width:75px;text-align:right">End Hrs</th>
        <th style="width:70px;text-align:right">Hrs Used</th>
        <th style="width:36px"></th>
      </tr>
    </thead>
    <tbody id="equip-body"></tbody>
  </table>

  <!-- Mobile Cards -->
  <div class="equip-cards" id="equip-cards"></div>

  <!-- Totals -->
  <div class="totals-bar">
    <div class="total-item">
      <div class="t-label">Items</div>
      <div class="t-value" id="total-count">0</div>
    </div>
  </div>

  <!-- Desktop Actions -->
  <div class="actions desktop-actions" style="margin-top:16px">
    <button class="btn-action" onclick="clearAll()">Clear All</button>
    <button class="btn-action primary" onclick="window.print()">Print / Export PDF</button>
  </div>

</div>

<!-- Mobile Sticky Action Bar -->
<div class="mobile-action-bar">
  <button class="btn-action" onclick="clearAll()">Clear</button>
  <button class="btn-action primary" onclick="window.print()">Print / PDF</button>
</div>

<script>
const DAY_NAMES = ['Sat','Sun','Mon','Tue','Wed','Thu','Fri'];
const DAY_SHORT = ['Sa','Su','M','T','W','T','F'];
let rows = [];

// ── Clock ──
function updateClock() {
  const now = new Date();
  document.getElementById('live-clock').textContent =
    now.toLocaleDateString('en-US', { month:'2-digit', day:'2-digit', year:'2-digit' }) + ' ' +
    now.toLocaleTimeString('en-US', { hour:'2-digit', minute:'2-digit' });
}
setInterval(updateClock, 1000);
updateClock();

// ── Week dates ──
function setWeekDates(endDateStr) {
  const grid = document.getElementById('week-days-grid');
  grid.innerHTML = '';

  let endDate = endDateStr ? new Date(endDateStr + 'T12:00:00') : null;
  if (!endDate || isNaN(endDate)) {
    endDate = new Date();
    endDate.setDate(endDate.getDate() + ((5 - endDate.getDay() + 7) % 7)); // upcoming Friday
  }

  const start = new Date(endDate);
  start.setDate(endDate.getDate() - 6);

  for (let i = 0; i < 7; i++) {
    const d = new Date(start);
    d.setDate(start.getDate() + i);
    const div = document.createElement('div');
    div.className = 'week-day';
    div.innerHTML = `<div class="day-name">${DAY_NAMES[i]}</div>
      <input type="text" readonly value="${(d.getMonth()+1).toString().padStart(2,'0')}/${d.getDate().toString().padStart(2,'0')}" />`;
    grid.appendChild(div);
  }
}

// ── Multi-job state ──
// db is the full saved blob: a set of jobs, each with its own weeks/meta/currentWeek.
// `store` always points at the active job, so the rest of the app keeps using
// store.currentWeek / store.meta / store.weeks exactly as before.
let db = {
  version: 3,
  currentJobId: null,
  jobs: {}                  // { jobId: { id, meta, currentWeek, weeks } }
};
let store = null;           // → db.jobs[db.currentJobId]

function genJobId() {
  return 'j_' + Date.now().toString(36) + Math.random().toString(36).slice(2, 7);
}

function newJob(name, weekEnd) {
  const id = genJobId();
  const wk = weekEnd || defaultWeekEnd();
  return {
    id,
    meta: { project: name || '', reportNum: '', super: '', notes: '' },
    currentWeek: wk,
    weeks: { [wk]: { rows: [] } }
  };
}

function setActiveJob(id) {
  if (!db.jobs[id]) return;
  db.currentJobId = id;
  store = db.jobs[id];
  if (!store.currentWeek || !store.weeks[store.currentWeek]) {
    store.currentWeek = Object.keys(store.weeks).sort().reverse()[0] || defaultWeekEnd();
    if (!store.weeks[store.currentWeek]) store.weeks[store.currentWeek] = { rows: [] };
  }
  rows = store.weeks[store.currentWeek].rows;
}

function jobName(id) {
  const j = db.jobs[id];
  return (j && j.meta && j.meta.project) ? j.meta.project : '(untitled job)';
}

function rebuildJobDropdown() {
  const sel = document.getElementById('job-select');
  if (!sel) return;
  const ids = Object.keys(db.jobs)
    .sort((a, b) => jobName(a).localeCompare(jobName(b)));
  sel.innerHTML = ids.map(id =>
    `<option value="${esc(id)}" ${id === db.currentJobId ? 'selected' : ''}>${esc(jobName(id))}</option>`
  ).join('') + `<option value="__new_job__">+ New Job…</option>`;
}

document.getElementById('job-select').addEventListener('change', e => {
  const v = e.target.value;
  if (v === '__new_job__') { promptNewJob(); return; }
  switchToJob(v);
});

function switchToJob(id) {
  if (!id || id === db.currentJobId || !db.jobs[id]) { rebuildJobDropdown(); return; }
  // save the job we're leaving
  readMetaInputs();
  persistCurrentWeek();
  setActiveJob(id);
  applyMetaToInputs();
  rebuildJobDropdown();
  rebuildWeekDropdown();
  setWeekDates(store.currentWeek);
  renderRows();
  scheduleCloudSave();
}

function promptNewJob() {
  const name = window.prompt('Name for the new job / project:', '');
  if (name === null) { rebuildJobDropdown(); return; } // cancelled
  // save the job we're leaving first
  readMetaInputs();
  persistCurrentWeek();
  const job = newJob(name.trim(), defaultWeekEnd());
  db.jobs[job.id] = job;
  setActiveJob(job.id);
  applyMetaToInputs();
  rebuildJobDropdown();
  rebuildWeekDropdown();
  setWeekDates(store.currentWeek);
  renderRows();
  scheduleCloudSave();
}

function isoWeekEndForDate(d) {
  // Week runs Sat→Fri; the week-ending date is the upcoming Friday (or today if Friday).
  const day = d.getDay(); // 0=Sun ... 6=Sat
  const fri = new Date(d);
  fri.setDate(d.getDate() + ((5 - day + 7) % 7));
  const y = fri.getFullYear();
  const m = String(fri.getMonth() + 1).padStart(2, '0');
  const dd = String(fri.getDate()).padStart(2, '0');
  return `${y}-${m}-${dd}`;
}

function defaultWeekEnd() {
  return isoWeekEndForDate(new Date());
}

function formatWeekLabel(iso) {
  // 'YYYY-MM-DD' -> 'Wk ending MM/DD/YY'
  if (!iso) return '';
  const d = new Date(iso + 'T12:00:00');
  if (isNaN(d)) return iso;
  const mm = (d.getMonth()+1).toString().padStart(2,'0');
  const dd = d.getDate().toString().padStart(2,'0');
  const yy = d.getFullYear().toString().slice(-2);
  return `Wk ending ${mm}/${dd}/${yy}`;
}

function rebuildWeekDropdown() {
  const sel = document.getElementById('week-select');
  if (!sel) return;

  // Build set: last 9 week-endings from "this week's Friday" (covers ~2 months)
  // + any archived weeks (so older history isn't lost)
  // + the current week (in case it's outside both)
  const weekSet = new Set();
  const todayEnd = defaultWeekEnd(); // this week's Friday in YYYY-MM-DD
  const baseDate = new Date(todayEnd + 'T12:00:00');
  for (let i = 0; i < 9; i++) {
    const d = new Date(baseDate);
    d.setDate(baseDate.getDate() - 7 * i);
    weekSet.add(d.toISOString().split('T')[0]);
  }
  // include any archived weeks beyond the rolling window
  Object.keys(store.weeks).forEach(w => weekSet.add(w));
  // include currently-selected week even if it's somehow outside
  if (store.currentWeek) weekSet.add(store.currentWeek);

  // sort descending (newest first)
  const weeks = Array.from(weekSet).sort().reverse();

  sel.innerHTML = weeks.map(w => {
    const hasData = store.weeks[w] && store.weeks[w].rows && store.weeks[w].rows.length > 0;
    const label = formatWeekLabel(w) + (hasData ? '' : ' · empty');
    return `<option value="${w}" ${w === store.currentWeek ? 'selected' : ''}>${label}</option>`;
  }).join('') + `<option value="__new__">+ Pick another week…</option>`;
}

document.getElementById('week-select').addEventListener('change', e => {
  const v = e.target.value;
  if (v === '__new__') {
    promptNewWeek();
    return;
  }
  switchToWeek(v);
});

function promptNewWeek() {
  const guess = store.currentWeek || defaultWeekEnd();
  const input = window.prompt('Enter week-ending date (YYYY-MM-DD):', guess);
  if (!input) {
    rebuildWeekDropdown();
    return;
  }
  const d = new Date(input + 'T12:00:00');
  if (isNaN(d)) {
    alert('Invalid date. Use YYYY-MM-DD format.');
    rebuildWeekDropdown();
    return;
  }
  const iso = isoWeekEndForDate(d); // snap to Friday week-ending
  if (iso === store.currentWeek) {
    rebuildWeekDropdown();
    return;
  }
  switchToWeek(iso);
}

function switchToWeek(iso) {
  if (!iso || iso === store.currentWeek) return;
  // save the week we're leaving
  persistCurrentWeek();

  // warn before propagating to future weeks
  const leavingIso = store.currentWeek;
  const affectedWeeks = Object.keys(store.weeks)
    .filter(w => w > leavingIso && store.weeks[w].rows?.length > 0)
    .sort();
  let shouldPropagate = true;
  if (affectedWeeks.length > 0) {
    shouldPropagate = window.confirm(
      `Saving changes to week ${leavingIso} will update the following future weeks:\n\n${affectedWeeks.join('\n')}\n\nContinue?`
    );
  }
  if (shouldPropagate) propagateForward(leavingIso);

  store.currentWeek = iso;

  // If this week already has rows, just load them.
  // Otherwise look back for the most recent prior week with data and carry over.
  if (store.weeks[iso] && store.weeks[iso].rows && store.weeks[iso].rows.length > 0) {
    rows = store.weeks[iso].rows;
  } else {
    const priorIso = findMostRecentPriorWeekWithData(iso);
    if (priorIso) {
      const priorRows = store.weeks[priorIso].rows;
      store.weeks[iso] = { rows: carryRows(priorRows) };
    } else {
      // no prior data — start blank
      store.weeks[iso] = { rows: [] };
    }
    rows = store.weeks[iso].rows;
  }

  rebuildWeekDropdown();
  setWeekDates(iso);
  renderRows();
  saveData();
}

function persistCurrentWeek() {
  if (!store.currentWeek) return;
  store.weeks[store.currentWeek] = { rows: rows };
}

function findMostRecentPriorWeekWithData(iso) {
  const target = new Date(iso + 'T12:00:00').getTime();
  const candidates = Object.keys(store.weeks)
    .filter(w => {
      const t = new Date(w + 'T12:00:00').getTime();
      return t < target && store.weeks[w].rows && store.weeks[w].rows.length > 0;
    })
    .sort()
    .reverse();
  return candidates[0] || null;
}

function carryRows(priorRows) {
  // copy each row: End Hrs -> next week's Start Hrs, clear End Hrs + days
  return priorRows.map(r => ({
    id: Date.now() + Math.random(),
    originId: r.originId || r.id,
    desc: r.desc || '',
    equip: r.equip || '',
    company: r.company || '',
    start: r.start || '',
    release: r.release || '',
    days: [false,false,false,false,false,false,false],
    startHrs: (r.endHrs && !isNaN(parseFloat(r.endHrs))) ? r.endHrs : '',
    endHrs: '',
    cost: r.cost || ''
  }));
}

function resolveEquipConflicts(fromIso) {
  const futureWeeks = Object.keys(store.weeks).filter(w => w > fromIso).sort();
  if (!futureWeeks.length) return;
  const sourceRows = store.weeks[fromIso].rows;
  const conflicts = new Map(); // oid → { srcRow, matches: [{weekIso, row}] }
  for (const srcRow of sourceRows) {
    const oid = srcRow.originId || srcRow.id;
    if (!srcRow.equip) continue;
    for (const weekIso of futureWeeks) {
      const futureRows = store.weeks[weekIso].rows || [];
      if (futureRows.some(r => (r.originId || r.id) === oid)) continue; // already linked
      const equipMatch = futureRows.find(r => r.equip && r.equip === srcRow.equip);
      if (equipMatch) {
        if (!conflicts.has(oid)) conflicts.set(oid, { srcRow, matches: [] });
        conflicts.get(oid).matches.push({ weekIso, row: equipMatch });
      }
    }
  }
  if (!conflicts.size) return;
  const lines = [];
  for (const { srcRow, matches } of conflicts.values()) {
    const weeks = matches.map(m => m.weekIso).join(', ');
    lines.push(`• #${srcRow.equip}${srcRow.desc ? ' (' + srcRow.desc + ')' : ''} — found in: ${weeks}`);
  }
  const msg = `The following equipment numbers already exist in future weeks:\n\n${lines.join('\n')}\n\nMerge and overwrite those entries?`;
  if (!window.confirm(msg)) return;
  for (const { srcRow, matches } of conflicts.values()) {
    const oid = srcRow.originId || srcRow.id;
    for (const { weekIso, row } of matches) {
      const futureRows = store.weeks[weekIso].rows;
      const idx = futureRows.indexOf(row);
      if (idx !== -1) futureRows[idx] = { ...row, originId: oid };
    }
  }
  propagateForward(fromIso);
  scheduleCloudSave();
}

function propagateForward(fromIso) {
  const futureWeeks = Object.keys(store.weeks).filter(w => w > fromIso).sort();
  if (!futureWeeks.length) return;
  let sourceRows = store.weeks[fromIso].rows;
  for (const weekIso of futureWeeks) {
    const futureRows = store.weeks[weekIso].rows || [];
    const matchedSourceIds = new Set();
    const matchedEquips = new Set();
    const result = [];

    // Update existing future rows — match by originId first, fall back to equip number
    for (const futureRow of futureRows) {
      const foid = futureRow.originId || futureRow.id;
      let srcRow = sourceRows.find(r => (r.originId || r.id) === foid);
      if (!srcRow && futureRow.equip) srcRow = sourceRows.find(r => r.equip && r.equip === futureRow.equip);
      if (!srcRow) { result.push(futureRow); continue; }
      const oid = srcRow.originId || srcRow.id;
      matchedSourceIds.add(oid);
      if (srcRow.equip) matchedEquips.add(srcRow.equip);
      result.push({ ...futureRow, originId: oid, desc: srcRow.desc, equip: srcRow.equip,
        company: srcRow.company, start: srcRow.start, release: srcRow.release, cost: srcRow.cost,
        startHrs: (srcRow.endHrs && !isNaN(parseFloat(srcRow.endHrs))) ? srcRow.endHrs : futureRow.startHrs });
    }

    // Add source rows that had no match in this future week
    for (const srcRow of sourceRows) {
      const oid = srcRow.originId || srcRow.id;
      if (matchedSourceIds.has(oid)) continue;
      if (srcRow.equip && matchedEquips.has(srcRow.equip)) continue;
      result.push({
        id: Date.now() + Math.random(), originId: oid,
        desc: srcRow.desc || '', equip: srcRow.equip || '',
        company: srcRow.company || '', start: srcRow.start || '', release: srcRow.release || '',
        days: [false,false,false,false,false,false,false],
        startHrs: (srcRow.endHrs && !isNaN(parseFloat(srcRow.endHrs))) ? srcRow.endHrs : '',
        endHrs: '', cost: srcRow.cost || ''
      });
    }

    // Safety net: deduplicate by equip number, keeping first occurrence
    const seenEquips = new Set();
    const deduped = result.filter(r => {
      if (!r.equip) return true;
      if (seenEquips.has(r.equip)) return false;
      seenEquips.add(r.equip);
      return true;
    });
    store.weeks[weekIso] = { rows: deduped };
    sourceRows = deduped;
  }
}

// ── Row management ──
function newRow() {
  const id = Date.now() + Math.random();
  return {
    id,
    originId: id,
    desc: '', equip: '', company: '', start: '', release: '',
    days: [false,false,false,false,false,false,false],
    startHrs: '', endHrs: '', cost: ''
  };
}

function addRow(data) {
  const r = data || newRow();
  rows.push(r);
  renderRows();
  saveData();
}

function deleteRow(id) {
  if (!confirm('Remove this equipment entry?')) return;
  rows = rows.filter(r => r.id !== id);
  renderRows();
  updateTotals();
  saveData();
}

function renderRows() {
  renderDesktopRows();
  renderMobileCards();
  updateTotals();
}

function renderDesktopRows() {
  const tbody = document.getElementById('equip-body');
  tbody.innerHTML = '';
  rows.forEach(r => {
    const tr = document.createElement('tr');
    const collapsed = isDaysCollapsed(r);
    const daySection = collapsed
      ? `<td class="day-cell days-collapsed" colspan="8"><button type="button" class="btn-collapsed-days" onclick="editDays(${r.id})" title="On-site all week — click to edit individual days">✓ On-site all week</button></td>`
      : `${r.days.map((checked, i) => `
        <td class="day-cell"><input type="checkbox" ${checked ? 'checked' : ''} data-field="day${i}" data-id="${r.id}" /></td>
      `).join('')}
      <td class="day-cell"><button type="button" class="btn-all-days ${r.days.every(Boolean) ? 'active' : ''}" data-id="${r.id}" onclick="selectAllDays(${r.id})" title="Mark on-site all week">All</button></td>`;
    tr.innerHTML = `
      <td><input type="text" value="${esc(r.desc)}" placeholder="Enter description" data-field="desc" data-id="${r.id}" /></td>
      <td><input type="text" value="${esc(r.equip)}" placeholder="Enter equip #" data-field="equip" data-id="${r.id}" /></td>
      <td><input type="text" value="${esc(r.company)}" placeholder="Enter company" data-field="company" data-id="${r.id}" /></td>
      <td><input type="date" value="${esc(r.start)}" data-field="start" data-id="${r.id}" /></td>
      <td><input type="date" value="${esc(r.release)}" data-field="release" data-id="${r.id}" /></td>
      ${daySection}
      <td class="hrs-cell"><input type="text" inputmode="decimal" value="${esc(r.startHrs)}" placeholder="Enter hrs" data-field="startHrs" data-id="${r.id}" /></td>
      <td class="hrs-cell"><input type="text" inputmode="decimal" value="${esc(r.endHrs)}" placeholder="Enter hrs" data-field="endHrs" data-id="${r.id}" /></td>
      <td class="hrs-used-cell" id="hrs-used-${r.id}">${formatHrsUsed(r)}</td>
      <td><button class="btn-del" onclick="deleteRow(${r.id})" title="Remove">×</button></td>
    `;
    tbody.appendChild(tr);
  });

  bindFieldEvents(tbody);
}

function renderMobileCards() {
  const wrap = document.getElementById('equip-cards');
  wrap.innerHTML = '';

  if (rows.length === 0) {
    wrap.innerHTML = `<div style="text-align:center;padding:32px 16px;color:var(--muted);font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:0.1em;border:1px dashed var(--border);">No equipment yet.<br><br>Tap <strong style="color:var(--accent)">+ Add Equipment</strong> to start.</div>`;
    return;
  }

  rows.forEach(r => {
    const card = document.createElement('div');
    card.className = 'equip-card';
    const subParts = [];
    if (r.equip) subParts.push(`#${esc(r.equip)}`);
    if (r.company) subParts.push(esc(r.company));
    const subText = subParts.length ? subParts.map(s => `<span>${s}</span>`).join('') : '<span style="color:var(--mid)">No equip # / company</span>';

    card.innerHTML = `
      <div class="card-head">
        <div class="card-head-main">
          <input class="card-desc" type="text" value="${esc(r.desc)}" placeholder="Enter description" data-field="desc" data-id="${r.id}" autocomplete="off" />
          <div class="card-sub">${subText}</div>
        </div>
        <button class="card-del" onclick="deleteRow(${r.id})" aria-label="Remove">×</button>
      </div>
      <div class="card-body">

        <div class="field-grid">
          <div class="field-cell">
            <label>Equip #</label>
            <input type="text" value="${esc(r.equip)}" placeholder="Enter equip #" data-field="equip" data-id="${r.id}" autocomplete="off" />
          </div>
          <div class="field-cell">
            <label>Company</label>
            <input type="text" value="${esc(r.company)}" placeholder="Enter company" data-field="company" data-id="${r.id}" autocomplete="off" />
          </div>
          <div class="field-cell">
            <label>Rental Start</label>
            <input type="date" value="${esc(r.start)}" data-field="start" data-id="${r.id}" />
          </div>
          <div class="field-cell">
            <label>Est. Release</label>
            <input type="date" value="${esc(r.release)}" data-field="release" data-id="${r.id}" />
          </div>
        </div>

        <div class="days-chips-wrap" style="margin-bottom:10px">
          <div class="days-chips-head">
            <label>On-Site Days${isDaysCollapsed(r) ? '' : ' (Sa Su M T W T F)'}</label>
            ${isDaysCollapsed(r)
              ? `<button type="button" class="btn-all-days active" onclick="editDays(${r.id})">✓ All week · edit</button>`
              : `<button type="button" class="btn-all-days ${r.days.every(Boolean) ? 'active' : ''}" data-id="${r.id}" onclick="selectAllDays(${r.id})">All week</button>`}
          </div>
          ${isDaysCollapsed(r)
            ? `<div class="days-collapsed-banner">On-site all week (Sat–Fri)</div>`
            : `<div class="days-chips">
            ${r.days.map((checked, i) => `
              <div class="day-chip ${checked ? 'active' : ''}" data-chip-day="${i}" data-id="${r.id}">${DAY_SHORT[i]}</div>
            `).join('')}
          </div>`}
        </div>

        <div class="field-grid">
          <div class="field-cell full">
            <label>Start Hours (Meter)</label>
            <input type="text" inputmode="decimal" value="${esc(r.startHrs)}" placeholder="Enter start hrs" data-field="startHrs" data-id="${r.id}" autocomplete="off" />
          </div>
          <div class="field-cell full">
            <label>End Hours (Meter)</label>
            <input type="text" inputmode="decimal" value="${esc(r.endHrs)}" placeholder="Enter end hrs" data-field="endHrs" data-id="${r.id}" autocomplete="off" />
          </div>
          <div class="field-cell full hrs-used-readout" id="hrs-used-card-${r.id}">
            <label>Hours Used This Week</label>
            <div class="hrs-used-value">${formatHrsUsed(r)}</div>
          </div>
        </div>

      </div>
    `;
    wrap.appendChild(card);
  });

  bindFieldEvents(wrap);

  // chip toggles
  wrap.querySelectorAll('.day-chip').forEach(chip => {
    chip.addEventListener('click', () => {
      const id = parseFloat(chip.dataset.id);
      const idx = parseInt(chip.dataset.chipDay);
      const r = rows.find(r => r.id === id);
      if (!r) return;
      r.days[idx] = !r.days[idx];
      chip.classList.toggle('active');
      // mirror to desktop checkbox if visible
      const cb = document.querySelector(`#equip-body input[data-id="${id}"][data-field="day${idx}"]`);
      if (cb) cb.checked = r.days[idx];
      refreshAllDaysBtn(id);
      saveData();
    });
  });
}

// Rows shown with the day columns collapsed into one "on-site all week" cell.
// Screen-only view state (never persisted); cleared for printing so the full
// day grid always shows on the PDF.
const collapsedDayRows = new Set();
let printingReport = false;

function isDaysCollapsed(r) {
  return !printingReport && collapsedDayRows.has(r.id) && r.days.every(Boolean);
}

// "All week": mark every day on-site and collapse the day columns for that row.
function selectAllDays(id) {
  const r = rows.find(r => r.id === id);
  if (!r) return;
  r.days = [true, true, true, true, true, true, true];
  collapsedDayRows.add(id);
  renderRows();
  saveData();
}

// Expand a collapsed row back to individual day checkboxes (keeps the days on
// so you can uncheck specific ones).
function editDays(id) {
  collapsedDayRows.delete(id);
  renderRows();
}

// Light the "All week" button only when every day for that row is on.
function refreshAllDaysBtn(id) {
  const r = rows.find(r => r.id === id);
  if (!r) return;
  const allOn = r.days.every(Boolean);
  document.querySelectorAll(`.btn-all-days[data-id="${id}"]`)
    .forEach(b => b.classList.toggle('active', allOn));
}

// Expand every row for the duration of a print so the report shows all days.
window.addEventListener('beforeprint', () => { printingReport = true; renderRows(); });
window.addEventListener('afterprint', () => { printingReport = false; renderRows(); });

function bindFieldEvents(scope) {
  scope.querySelectorAll('input[type="text"], input[type="date"], select').forEach(el => {
    el.addEventListener('change', onFieldChange);
    el.addEventListener('input', onFieldChange);
  });
  scope.querySelectorAll('input[type="checkbox"]').forEach(el => {
    el.addEventListener('change', onFieldChange);
  });
}

function onFieldChange(e) {
  const el = e.target;
  const id = parseFloat(el.dataset.id);
  const field = el.dataset.field;
  const r = rows.find(r => r.id === id);
  if (!r) return;

  if (field.startsWith('day')) {
    const idx = parseInt(field.replace('day',''));
    r.days[idx] = el.checked;
    // mirror to mobile chip
    const chip = document.querySelector(`#equip-cards .day-chip[data-id="${id}"][data-chip-day="${idx}"]`);
    if (chip) chip.classList.toggle('active', el.checked);
    refreshAllDaysBtn(id);
  } else {
    r[field] = el.value;
    // refresh hours-used readout if a meter field changed
    if (field === 'startHrs' || field === 'endHrs') {
      refreshHrsUsed(r);
    }
    // if desc/equip/company changed on mobile card, refresh subline lazily on blur
    if (['desc','equip','company'].includes(field) && e.type === 'change') {
      refreshCardSublines();
    }
    if (field === 'equip' && e.type === 'change') {
      resolveEquipConflicts(store.currentWeek);
    }
  }

  updateTotals();
  saveData();
}

function calcHrsUsed(r) {
  const s = parseFloat(r.startHrs);
  const e = parseFloat(r.endHrs);
  if (isNaN(s) || isNaN(e)) return null;
  return e - s;
}

function formatHrsUsed(r) {
  const v = calcHrsUsed(r);
  if (v === null) return '<span class="hrs-empty">—</span>';
  if (v < 0) return `<span class="hrs-warn">${v.toFixed(1)}</span>`;
  return `${v.toFixed(1)} hr`;
}

function refreshHrsUsed(r) {
  const tdEl = document.getElementById('hrs-used-' + r.id);
  if (tdEl) tdEl.innerHTML = formatHrsUsed(r);
  const cardEl = document.getElementById('hrs-used-card-' + r.id);
  if (cardEl) {
    const v = cardEl.querySelector('.hrs-used-value');
    if (v) v.innerHTML = formatHrsUsed(r);
  }
}

function refreshCardSublines() {
  rows.forEach(r => {
    const card = document.querySelector(`#equip-cards .equip-card .card-desc[data-id="${r.id}"]`);
    if (!card) return;
    const sub = card.closest('.card-head-main').querySelector('.card-sub');
    if (!sub) return;
    const parts = [];
    if (r.equip) parts.push(`#${esc(r.equip)}`);
    if (r.company) parts.push(esc(r.company));
    sub.innerHTML = parts.length ? parts.map(s => `<span>${s}</span>`).join('') : '<span style="color:var(--mid)">No equip # / company</span>';
  });
}

function updateTotals() {
  document.getElementById('total-count').textContent = rows.length;
}

// ── Persistence ──
function readMetaInputs() {
  store.meta = {
    project: document.getElementById('project').value,
    reportNum: document.getElementById('report-num').value,
    super: document.getElementById('super').value,
  };
}

function applyMetaToInputs() {
  document.getElementById('project').value = store.meta.project || '';
  document.getElementById('report-num').value = store.meta.reportNum || '';
  document.getElementById('super').value = store.meta.super || '';
}

function saveData() {
  readMetaInputs();
  persistCurrentWeek();
  scheduleCloudSave();
}

function sanitizeRow(r) {
  return {
    id: r.id ?? (Date.now() + Math.random()),
    desc: r.desc || '',
    equip: r.equip || '',
    company: r.company || '',
    start: r.start || '',
    release: r.release || '',
    days: Array.isArray(r.days) && r.days.length === 7 ? r.days : [false,false,false,false,false,false,false],
    startHrs: r.startHrs || '',
    endHrs: r.endHrs || '',
    cost: r.cost || ''
  };
}

// ── Cloud sync ──
let saveTimer = null;
let pendingSave = false;

function setSyncStatus(status) {
  const pill = document.getElementById('sync-pill');
  if (!pill) return;
  pill.className = 'sync-pill ' + status;
  pill.textContent = { loading:'Loading', saving:'Saving…', saved:'Saved', error:'Error' }[status] ?? status;
}

function scheduleCloudSave() {
  clearTimeout(saveTimer);
  saveTimer = setTimeout(() => { saveTimer = null; propagateForward(store.currentWeek); cloudSave(); }, 1500);
}

window.addEventListener('beforeunload', e => {
  const affectedWeeks = Object.keys(store.weeks)
    .filter(w => w > store.currentWeek && store.weeks[w].rows?.length > 0);
  if (affectedWeeks.length > 0) {
    e.preventDefault();
    e.returnValue = '';
  }
});

async function cloudSave() {
  pendingSave = true;
  setSyncStatus('saving');
  readMetaInputs();
  persistCurrentWeek();
  try {
    const res = await fetch('/api/data', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(db)
    });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    setSyncStatus('saved');
  } catch(e) {
    setSyncStatus('error');
  } finally {
    pendingSave = false;
  }
}

function normalizeJob(j, fallbackId) {
  const meta = (j && j.meta) ? j.meta : {};
  const weeks = {};
  if (j && j.weeks && typeof j.weeks === 'object') {
    Object.keys(j.weeks).forEach(wk => {
      const w = j.weeks[wk];
      weeks[wk] = { rows: Array.isArray(w.rows) ? w.rows.map(sanitizeRow) : [] };
    });
  }
  let currentWeek = (j && j.currentWeek && weeks[j.currentWeek])
    ? j.currentWeek
    : (Object.keys(weeks).sort().reverse()[0] || defaultWeekEnd());
  if (!weeks[currentWeek]) weeks[currentWeek] = { rows: [] };
  return {
    id: (j && j.id) || fallbackId,
    meta: {
      project: meta.project || '',
      reportNum: meta.reportNum || '',
      super: meta.super || '',
      notes: meta.notes || ''
    },
    currentWeek,
    weeks
  };
}

// v3 reorders each row's `days` array from Mon→Sun to Sat→Fri (week now runs
// Sat→Fri). Runs once per source blob: any blob below v3 gets remapped, then the
// db is stamped v3 so it never reorders twice.
function remapDaysMonToSat(days) {
  if (!Array.isArray(days) || days.length !== 7) return [false,false,false,false,false,false,false];
  // old order: Mon,Tue,Wed,Thu,Fri,Sat,Sun  →  new: Sat,Sun,Mon,Tue,Wed,Thu,Fri
  return [days[5], days[6], days[0], days[1], days[2], days[3], days[4]];
}

function remapDbDaysToSatFirst(dbObj) {
  Object.values(dbObj.jobs).forEach(job => {
    Object.values(job.weeks).forEach(wk => {
      (wk.rows || []).forEach(r => { r.days = remapDaysMonToSat(r.days); });
    });
  });
}

// Accepts either the new multi-job shape ({ jobs }) or the legacy
// single-project shape ({ currentWeek, meta, weeks }) and returns a v3 db.
function migrateToDb(data) {
  const needsDayRemap = !(data && data.version >= 3);
  let result;
  if (data && data.jobs && typeof data.jobs === 'object' && Object.keys(data.jobs).length) {
    const jobs = {};
    Object.keys(data.jobs).forEach(id => { jobs[id] = normalizeJob(data.jobs[id], id); });
    let currentJobId = (data.currentJobId && jobs[data.currentJobId])
      ? data.currentJobId
      : Object.keys(jobs)[0];
    result = { version: 3, currentJobId, jobs };
  } else {
    // legacy single-project blob → wrap in one job
    const job = normalizeJob({
      meta: data && data.meta,
      currentWeek: data && data.currentWeek,
      weeks: data && data.weeks
    }, genJobId());
    result = { version: 3, currentJobId: job.id, jobs: { [job.id]: job } };
  }
  if (needsDayRemap) remapDbDaysToSatFirst(result);
  return result;
}

// Auto-advance the active job: if its stored week is in the past, jump to the
// current week, carrying over the most recent prior week's rows.
// Returns true if the week was advanced (so we know to re-upload).
function autoAdvanceWeek() {
  const thisWeek = defaultWeekEnd();
  let advanced = false;
  if (store.currentWeek < thisWeek) {
    if (!store.weeks[thisWeek] || !store.weeks[thisWeek].rows?.length) {
      const priorIso = findMostRecentPriorWeekWithData(thisWeek);
      store.weeks[thisWeek] = priorIso
        ? { rows: carryRows(store.weeks[priorIso].rows) }
        : { rows: [] };
    }
    store.currentWeek = thisWeek;
    advanced = true;
  }
  rows = store.weeks[store.currentWeek].rows;
  return advanced;
}

function applyCloudData(data) {
  db = migrateToDb(data);
  setActiveJob(db.currentJobId);
  return autoAdvanceWeek();
}

function migrateLocalStorage() {
  try {
    const rawV2 = localStorage.getItem('equip_report_v2');
    if (rawV2) {
      applyCloudData(JSON.parse(rawV2));
      localStorage.removeItem('equip_report_v2');
      localStorage.removeItem('equip_report');
      return true;
    }
    const rawV1 = localStorage.getItem('equip_report');
    if (rawV1) {
      const data = JSON.parse(rawV1);
      const m = data.meta || {};
      const wk = m.weekEnd || defaultWeekEnd();
      applyCloudData({
        meta: { project:m.project||'', reportNum:m.reportNum||'', super:m.super||'', notes:m.notes||'' },
        currentWeek: wk,
        weeks: { [wk]: { rows: Array.isArray(data.rows) ? data.rows : [] } }
      });
      localStorage.removeItem('equip_report');
      return true;
    }
  } catch(e) {}
  return false;
}

async function cloudLoad() {
  setSyncStatus('loading');
  let hadData = false;
  let shouldUpload = false;
  try {
    const res = await fetch('/api/data');
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();
    if (data) {
      const wasCurrent = !!(data.jobs) && data.version >= 3;  // multi-job AND Sat→Fri days?
      const advanced = applyCloudData(data);
      hadData = true;
      // re-upload if we migrated an old blob (shape or day-order), or advanced a week
      shouldUpload = !wasCurrent || advanced;
    } else {
      shouldUpload = migrateLocalStorage();
      if (shouldUpload) {
        hadData = true;
      } else {
        const job = newJob('', defaultWeekEnd());
        db = { version: 3, currentJobId: job.id, jobs: { [job.id]: job } };
        setActiveJob(job.id);
      }
    }
    setSyncStatus(shouldUpload ? 'saving' : 'saved');
  } catch(e) {
    setSyncStatus('error');
    hadData = true; // avoid seeding on error
  }
  applyMetaToInputs();
  rebuildJobDropdown();
  rebuildWeekDropdown();
  setWeekDates(store.currentWeek);
  renderRows();
  if (shouldUpload) await cloudSave();
  return hadData;
}

async function cloudRefresh() {
  try {
    const res = await fetch('/api/data');
    if (!res.ok) return;
    const data = await res.json();
    if (!data) return;
    const activeJobId = db.currentJobId;
    const activeWeek = store.currentWeek;
    db = migrateToDb(data);
    // stay on the same job/week the user was viewing, if they still exist remotely
    if (db.jobs[activeJobId]) db.currentJobId = activeJobId;
    setActiveJob(db.currentJobId);
    if (store.weeks[activeWeek]) {
      store.currentWeek = activeWeek;
      rows = store.weeks[activeWeek].rows;
    }
    applyMetaToInputs();
    rebuildJobDropdown();
    rebuildWeekDropdown();
    setWeekDates(store.currentWeek);
    renderRows();
    setSyncStatus('saved');
  } catch(e) {}
}

setInterval(() => {
  if (document.hidden) return;
  if (pendingSave || saveTimer !== null) return;
  if (document.activeElement && ['INPUT','TEXTAREA','SELECT'].includes(document.activeElement.tagName)) return;
  cloudRefresh();
}, 30000);

function clearAll() {
  if (!confirm('Clear all equipment entries for this week?')) return;
  store.weeks[store.currentWeek] = { rows: [] };
  rows = store.weeks[store.currentWeek].rows;
  renderRows();
  saveData();
}

// bind meta inputs to save
['report-num','super'].forEach(id => {
  document.getElementById(id).addEventListener('input', saveData);
});

// editing the Project / Job field renames the active job — keep the dropdown label in sync
document.getElementById('project').addEventListener('input', () => {
  saveData();
  const sel = document.getElementById('job-select');
  const opt = sel && sel.querySelector(`option[value="${db.currentJobId}"]`);
  if (opt) opt.textContent = jobName(db.currentJobId);
});

function esc(s) {
  return (s == null ? '' : String(s)).replace(/"/g, '&quot;').replace(/</g, '&lt;');
}

// ── Init ──
(async () => {
  // seed a temporary empty job so the first render has something to point at;
  // cloudLoad() replaces db with whatever is in the cloud (migrating old shapes).
  const seed = newJob('', defaultWeekEnd());
  db = { version: 3, currentJobId: seed.id, jobs: { [seed.id]: seed } };
  setActiveJob(seed.id);
  rebuildJobDropdown();
  rebuildWeekDropdown();
  setWeekDates(store.currentWeek);
  const hadData = await cloudLoad();
  if (!hadData) {
    addRow({
      id: Date.now(),
      desc: '20KW GENERATOR', equip: '217815', company: 'SUN',
      start: '2026-05-01', release: '2026-05-08',
      days: [false,false,false,false,false,false,false],
      startHrs: '', endHrs: '', cost: '278.14'
    });
  }
})();
</script>
